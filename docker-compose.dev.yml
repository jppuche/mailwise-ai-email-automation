services:
  api:
    volumes:
      - ./src:/app/src
    command: uvicorn src.api.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      - DEBUG=true

  worker:
    volumes:
      - ./src:/app/src
    command: celery -A src.tasks.celery_app worker --loglevel=debug

  scheduler:
    volumes:
      - ./src:/app/src

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

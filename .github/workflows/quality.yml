name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://mailwise:password@localhost:5432/mailwise"
      DATABASE_URL_SYNC: "postgresql+psycopg2://mailwise:password@localhost:5432/mailwise"
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: >
          pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          tests/unit/
          tests/api/
          tests/core/
          tests/contract/
          tests/tasks/
          tests/scheduler/
          tests/infrastructure/
          -q
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test -- --run

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
